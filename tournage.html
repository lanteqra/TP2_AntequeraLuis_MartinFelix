<!DOCTYPE html>
<html lang="fr-ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournage | Interstellar </title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=GFS+Didot&family=Inter:wght@300;400;500;700&display=swap"
        rel="stylesheet">

    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/material-design-icons/3.0.1/iconfont/material-icons.min.css"
        integrity="sha256-x8PYmLKD83R9T/sYmJn1j3is/chhJdySyhet/JuHnfY=" crossorigin="anonymous" />
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/style.css">

    <style type="text/tailwindcss">
        @theme {
            --color-noir-espace: #0A0C10;
            --color-bleu-nuit: #0D1B2A;
            --color-beige-terre: #C8A97E;
            --color-orange-horizon: #FF8C00;
            --color-blanc-stellaire: #E8E0D0;
            --font-titre: "GFS Didot", serif;
            --font-corps: "Inter", sans-serif;
        }
        
    </style>



<body class="font-corps">
    <!-- Accessibilité -->
    <a href="#content" class="screen-reader-text">Aller au contenu principal</a>
    <header>
        <div class="grid grid-cols-12 gap-1 text-center">

            <!-- component -->
            <nav class="col-span-12 flex items-center bg-bleu-nuit p-3 flex-wrap">
                <a href="index.html" class="p-2 mr-4 inline-flex items-center">
                    <img src="media/logo.jpg" alt="logo" class="w-24 h-24 rounded-full p-4">
                    <span
                        class="font-titre text-xl text-blanc-stellaire font-bold uppercase tracking-wide hover:text-orange-horizon"">Interstellar</span>
                </a>
                <button
                    class=" text-blanc-stellaire inline-flex p-4 hover:bg-blanc-stellaire/25 rounded lg:hidden ml-auto
                        hover:text-orange-horizon outline-none nav-toggler" data-target="#navigation">
                        <i class="material-icons !text-4xl">menu</i>
                        </button>
                        <div class="hidden top-navbar w-full lg:inline-flex lg:flex-grow lg:w-auto" id="navigation">
                            <div
                                class="lg:inline-flex lg:flex-row lg:ml-auto lg:w-auto w-full lg:items-center items-start  flex flex-col lg:h-auto pr-5 gap-3.5 text-[1.2rem]">
                                <a href="index.html"
                                    class="lg:inline-flex lg:w-auto w-full px-3 py-2 rounded text-bleu-nuit font-extrabold items-center justify-center bg-blanc-stellaire hover:bg-blanc-stellaire transition-colors hover:text-orange-horizon">
                                    <span>Accueil</span>
                                </a>
                                <a href="tournage.html"
                                    class="lg:inline-flex lg:w-auto w-full px-3 py-2 rounded text-bleu-nuit font-semibold items-center justify-center bg-beige-terre hover:bg-blanc-stellaire hover:text-orange-horizon transition-colors">
                                    <span>Tournage</span>
                                </a>

                            </div>
                        </div>
            </nav>


            <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"
                integrity="sha256-xNzN2a4ltkB44Mc/Jz3pT4iU1cmeR0FkXs4pru/JxaQ=" crossorigin="anonymous"></script>
            <script>
                $(document).ready(function () {
                    $(".nav-toggler").each(function (_, navToggler) {
                        var target = $(navToggler).data("target");
                        $(navToggler).on("click", function () {
                            $(target).animate({
                                height: "toggle"
                            });
                        });
                    });
                });

            </script>


        </div>

    </header>

    </main>
    <footer>

    </footer>



</body>
