<!DOCTYPE html>
<html lang=fr-ca">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Accueil | </title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <style type="text/tailwindcss">
        @layer components {
        .test {
            @apply text-3xl font-bold underline flex hover:bg-red-50 hover:text-white;
        }
        
        }
    </style>
    <link rel="stylesheet"
                href="https://cdnjs.cloudflare.com/ajax/libs/material-design-icons/3.0.1/iconfont/material-icons.min.css"
                integrity="sha256-x8PYmLKD83R9T/sYmJn1j3is/chhJdySyhet/JuHnfY=" crossorigin="anonymous" />
            <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@300;400;500;700;900&display=swap"
                rel="stylesheet">
            

<body>
    <header>
        <div class="grid grid-cols-12 gap-1 text-center">

            <!-- component -->
            <nav class="col-span-12 flex items-center bg-gray-800 p-3 flex-wrap">
                <a href="index.html" class="p-2 mr-4 inline-flex items-center">
                    <img src="media/logo.jpg" alt="logo" class="w-24 h-24 rounded-full p-4">
                    <span class="text-xl text-white font-bold uppercase tracking-wide">Interstellar</span>
                </a>
                <button
                    class="text-white inline-flex p-3 hover:bg-gray-900 rounded lg:hidden ml-auto hover:text-white outline-none nav-toggler"
                    data-target="#navigation">
                    <i class="material-icons">menu</i>
                </button>
                <div class="hidden top-navbar w-full lg:inline-flex lg:flex-grow lg:w-auto" id="navigation">
                    <div
                        class="lg:inline-flex lg:flex-row lg:ml-auto lg:w-auto w-full lg:items-center items-start  flex flex-col lg:h-auto">
                        <a href="index.html"
                            class="lg:inline-flex lg:w-auto w-full px-3 py-2 rounded text-gray-400 items-center justify-center hover:bg-gray-900 hover:text-white">
                            <span>Accueil</span>
                        </a>
                        <a href="tournage.html"
                            class="lg:inline-flex lg:w-auto w-full px-3 py-2 rounded text-gray-400 items-center justify-center hover:bg-gray-900 hover:text-white">
                            <span>Tournage</span>
                        </a>
                        
                    </div>
                </div>
            </nav>


            <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.5.0/jquery.min.js"
                integrity="sha256-xNzN2a4ltkB44Mc/Jz3pT4iU1cmeR0FkXs4pru/JxaQ=" crossorigin="anonymous"></script>
            <script>
                $(document).ready(function () {
                    $(".nav-toggler").each(function (_, navToggler) {
                        var target = $(navToggler).data("target");
                        $(navToggler).on("click", function () {
                            $(target).animate({
                                height: "toggle"
                            });
                        });
                    });
                });

            </script>


        </div>

    </header>
    <main>

    </main>
    <footer>

    </footer>



</body>

</html>
